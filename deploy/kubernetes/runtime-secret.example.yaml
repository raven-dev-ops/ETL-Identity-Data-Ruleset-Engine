apiVersion: v1
kind: Secret
metadata:
  name: identity-runtime-secret
  labels:
    app.kubernetes.io/name: etl-identity-engine
    app.kubernetes.io/component: runtime
type: Opaque
stringData:
  ETL_IDENTITY_STATE_DB: postgresql://etl_identity:replace-me-postgres-password@identity-postgres:5432/identity_state
  ETL_IDENTITY_OBJECT_STORAGE_ACCESS_KEY: disabled
  ETL_IDENTITY_OBJECT_STORAGE_SECRET_KEY: disabled
  ETL_IDENTITY_SERVICE_READER_API_KEY: replace-me-reader-api-key
  ETL_IDENTITY_SERVICE_OPERATOR_API_KEY: replace-me-operator-api-key
