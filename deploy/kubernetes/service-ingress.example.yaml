apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: identity-service
  labels:
    app.kubernetes.io/name: etl-identity-engine
    app.kubernetes.io/component: service-api
spec:
  rules:
    - host: identity.internal.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: 8000
