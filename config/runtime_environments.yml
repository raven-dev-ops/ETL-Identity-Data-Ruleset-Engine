default_environment: dev

environments:
  dev:
    description: Local developer defaults for repository execution.
    config_dir: .
    state_db: ../data/state/dev/pipeline_state.sqlite
  test:
    description: Automated test and CI defaults.
    config_dir: .
    state_db: ../data/state/test/pipeline_state.sqlite
  container:
    description: Container-image defaults for single-host deployments.
    config_dir: .
    state_db: ${ETL_IDENTITY_STATE_DB:-/runtime/state/pipeline_state.sqlite}
    secrets:
      object_storage_access_key: ${ETL_IDENTITY_OBJECT_STORAGE_ACCESS_KEY:-disabled}
      object_storage_secret_key: ${ETL_IDENTITY_OBJECT_STORAGE_SECRET_KEY:-disabled}
    service_auth:
      mode: api_key
      header_name: X-API-Key
      reader_api_key: ${ETL_IDENTITY_SERVICE_READER_API_KEY:-}
      operator_api_key: ${ETL_IDENTITY_SERVICE_OPERATOR_API_KEY:-}
      reader_scopes:
        - service:health
        - service:metrics
        - runs:read
        - golden:read
        - crosswalk:read
        - public_safety:read
        - review_cases:read
      operator_scopes:
        - service:health
        - service:metrics
        - runs:read
        - runs:replay
        - runs:publish
        - golden:read
        - crosswalk:read
        - public_safety:read
        - audit_events:read
        - review_cases:read
        - review_cases:write
        - exports:run
  cluster:
    description: Kubernetes defaults for PostgreSQL-backed clustered deployments.
    config_dir: .
    state_db: ${ETL_IDENTITY_STATE_DB}
    secrets:
      object_storage_access_key: ${ETL_IDENTITY_OBJECT_STORAGE_ACCESS_KEY:-disabled}
      object_storage_secret_key: ${ETL_IDENTITY_OBJECT_STORAGE_SECRET_KEY:-disabled}
    service_auth:
      mode: api_key
      header_name: X-API-Key
      reader_api_key: ${ETL_IDENTITY_SERVICE_READER_API_KEY}
      operator_api_key: ${ETL_IDENTITY_SERVICE_OPERATOR_API_KEY}
      reader_scopes:
        - service:health
        - service:metrics
        - runs:read
        - golden:read
        - crosswalk:read
        - public_safety:read
        - review_cases:read
      operator_scopes:
        - service:health
        - service:metrics
        - runs:read
        - runs:replay
        - runs:publish
        - golden:read
        - crosswalk:read
        - public_safety:read
        - audit_events:read
        - review_cases:read
        - review_cases:write
        - exports:run
  prod:
    description: Production defaults sourced from deployment environment variables.
    config_dir: ${ETL_IDENTITY_CONFIG_DIR:-.}
    state_db: ${ETL_IDENTITY_STATE_DB}
    secrets:
      object_storage_access_key: ${ETL_IDENTITY_OBJECT_STORAGE_ACCESS_KEY}
      object_storage_secret_key: ${ETL_IDENTITY_OBJECT_STORAGE_SECRET_KEY}
    service_auth:
      mode: jwt
      header_name: Authorization
      issuer: ${ETL_IDENTITY_SERVICE_JWT_ISSUER}
      audience: ${ETL_IDENTITY_SERVICE_JWT_AUDIENCE}
      algorithms:
        - RS256
      jwt_public_key_pem: ${ETL_IDENTITY_SERVICE_JWT_PUBLIC_KEY_PEM}
      role_claim: roles
      scope_claim: scope
      reader_roles:
        - etl-identity-reader
      operator_roles:
        - etl-identity-operator
      reader_scopes:
        - service:health
        - service:metrics
        - runs:read
        - golden:read
        - crosswalk:read
        - public_safety:read
        - review_cases:read
      operator_scopes:
        - service:health
        - service:metrics
        - runs:read
        - runs:replay
        - runs:publish
        - golden:read
        - crosswalk:read
        - public_safety:read
        - audit_events:read
        - review_cases:read
        - review_cases:write
        - exports:run
  cjis:
    description: CJIS-aligned deployment baseline sourced from deployment environment variables.
    config_dir: ${ETL_IDENTITY_CONFIG_DIR:-.}
    state_db: ${ETL_IDENTITY_STATE_DB}
    secrets:
      object_storage_access_key: ${ETL_IDENTITY_OBJECT_STORAGE_ACCESS_KEY}
      object_storage_secret_key: ${ETL_IDENTITY_OBJECT_STORAGE_SECRET_KEY}
    service_auth:
      mode: jwt
      header_name: Authorization
      issuer: ${ETL_IDENTITY_SERVICE_JWT_ISSUER}
      audience: ${ETL_IDENTITY_SERVICE_JWT_AUDIENCE}
      algorithms:
        - RS256
      jwt_public_key_pem: ${ETL_IDENTITY_SERVICE_JWT_PUBLIC_KEY_PEM}
      role_claim: roles
      scope_claim: scope
      subject_claim: sub
      reader_roles:
        - etl-identity-reader
      operator_roles:
        - etl-identity-operator
      reader_scopes:
        - service:health
        - service:metrics
        - runs:read
        - golden:read
        - crosswalk:read
        - public_safety:read
        - review_cases:read
      operator_scopes:
        - service:health
        - service:metrics
        - runs:read
        - runs:replay
        - runs:publish
        - golden:read
        - crosswalk:read
        - public_safety:read
        - audit_events:read
        - review_cases:read
        - review_cases:write
        - exports:run
