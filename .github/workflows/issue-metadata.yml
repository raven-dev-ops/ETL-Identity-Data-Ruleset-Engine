name: Issue Metadata

on:
  push:
    branches:
      - main
    paths:
      - ".github/ISSUE_TEMPLATE/**"
      - "scripts/verify_github_issue_metadata.py"
      - ".github/workflows/issue-metadata.yml"
  workflow_dispatch:

jobs:
  verify-github-issue-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify GitHub-recognized issue metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python scripts/verify_github_issue_metadata.py --repo "${{ github.repository }}"
