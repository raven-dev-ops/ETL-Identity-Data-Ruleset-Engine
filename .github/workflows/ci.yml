name: CI

on:
  push:
  pull_request:

jobs:
  test-linux:
    name: test-linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bootstrap venv via documented bash path
        env:
          INSTALL_GH: "0"
        run: bash ./scripts/bootstrap_venv.sh

      - name: Run repo checks via documented bash path
        run: bash ./scripts/run_checks.sh

      - name: Validate bootstrap backlog sync dry-run
        run: .venv/bin/python scripts/create_github_backlog.py --repo raven-dev-ops/ETL-Identity-Data-Ruleset-Engine --backlog-path planning/github-issues-backlog.md --include-closed --dry-run

      - name: Generate coverage report
        run: |
          .venv/bin/python -m pytest --cov=etl_identity_engine --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-linux
          path: coverage.xml
          if-no-files-found: error

  compat-linux-312:
    name: compat-linux-312
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bootstrap venv via documented bash path
        env:
          INSTALL_GH: "0"
        run: bash ./scripts/bootstrap_venv.sh

      - name: Run repo checks via documented bash path
        run: bash ./scripts/run_checks.sh

  test-windows:
    name: test-windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bootstrap venv via documented PowerShell path
        shell: pwsh
        run: ./scripts/bootstrap_venv.ps1 -InstallGh:$false

      - name: Run repo checks via documented PowerShell path
        shell: pwsh
        run: ./scripts/run_checks.ps1

      - name: Generate coverage report
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m pytest --cov=etl_identity_engine --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-windows
          path: coverage.xml
          if-no-files-found: error

  compat-windows-312:
    name: compat-windows-312
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bootstrap venv via documented PowerShell path
        shell: pwsh
        run: ./scripts/bootstrap_venv.ps1 -InstallGh:$false

      - name: Run repo checks via documented PowerShell path
        shell: pwsh
        run: ./scripts/run_checks.ps1

  compat-macos-312:
    name: compat-macos-312
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bootstrap venv via documented bash path
        env:
          INSTALL_GH: "0"
        run: bash ./scripts/bootstrap_venv.sh

      - name: Run repo checks via documented bash path
        run: bash ./scripts/run_checks.sh

  container-smoke:
    name: container-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run container smoke test
        run: python scripts/container_smoke_test.py --image-tag etl-identity-engine:ci --service-port 18080

  kubernetes-manifest-smoke:
    name: kubernetes-manifest-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bootstrap venv via documented bash path
        env:
          INSTALL_GH: "0"
        run: bash ./scripts/bootstrap_venv.sh

      - name: Run Kubernetes manifest smoke test
        run: .venv/bin/python scripts/kubernetes_manifest_smoke.py --image-tag etl-identity-engine:k8s-ci --service-port 18081

  postgresql-ha-rehearsal:
    name: postgresql-ha-rehearsal
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bootstrap venv via documented bash path
        env:
          INSTALL_GH: "0"
        run: bash ./scripts/bootstrap_venv.sh

      - name: Run PostgreSQL HA rehearsal
        run: .venv/bin/python scripts/postgresql_ha_rehearsal.py --image-tag etl-identity-engine:ha-ci --service-port 18082 --writer-port 55440 --restore-port 55441

  container-supply-chain:
    name: container-supply-chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bootstrap venv via documented bash path
        env:
          INSTALL_GH: "0"
        run: bash ./scripts/bootstrap_venv.sh

      - name: Run container supply-chain checks
        run: .venv/bin/python scripts/container_supply_chain_check.py --output-dir dist/container-supply-chain --image-tag etl-identity-engine:supply-chain-ci

      - name: Upload container supply-chain artifact
        uses: actions/upload-artifact@v6
        with:
          name: container-supply-chain
          path: dist/container-supply-chain
          if-no-files-found: error

  release-hardening:
    name: release-hardening
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bootstrap venv via documented bash path
        env:
          INSTALL_GH: "0"
        run: bash ./scripts/bootstrap_venv.sh

      - name: Run release hardening checks
        run: .venv/bin/python scripts/release_hardening_check.py --output-dir dist/release-hardening

      - name: Upload release hardening artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-hardening-inventory
          path: dist/release-hardening
          if-no-files-found: error
